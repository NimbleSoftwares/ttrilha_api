spring:
  application:
    name: ttrilha-api
  config:
    import: optional:file:.env[.properties]

  jpa:
    hibernate:
      ddl-auto: validate
    flyway:
      locations: classpath:db/migration
      enabled: true
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://${AUTH0_OKTA_DOMAIN}/
          audiences: https://${AUTH0_API_AUDIENCE}/
  mvc:
    problemdetails:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true   # enables histogram for P50/P95/P99

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) [%X{traceId},%X{spanId}] %clr([%15.15t]){faint} %clr(%-40.40logger{36}){cyan} - %m%n%wEx"
    correlation: ""

auth0:
  audience: https://${AUTH0_API_AUDIENCE}/

overpass:
  baseUrl: https://overpass-api.de/api

openweathermap:
  apiKey: ${OPEN_WEATHER_MAP_KEY:}

