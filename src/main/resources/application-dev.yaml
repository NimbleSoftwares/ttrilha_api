spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ttrilha
    driver-class-name: org.postgresql.Driver
    username: ttrilha_user
    password: ttrilha_pass
  data:
    redis:
      host: localhost
      port: 6379
      username: ttrilha_app
      password: ttrilha123
      key-prefix: ttrilha_app_

cors:
  allowed-origins:
    - "*"

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.redis: DEBUG

management:
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces   # Tempo OTLP HTTP port
  tracing:
    sampling:
      probability: 1.0

loki4j:
  url: http://localhost:3100   # Loki push API