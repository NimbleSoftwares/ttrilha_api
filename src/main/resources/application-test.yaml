spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    hibernate:
      ddl-auto: validate
    flyway:
      locations: classpath:db/migration
      enabled: true

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG