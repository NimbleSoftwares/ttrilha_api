apiVersion: 1

datasources:
  # Prometheus datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: TraceID
          datasourceUid: tempo

  # Loki datasource
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: TraceID
          matcherRegex: '"traceId":"([^"]*)"'
          url: 'http://localhost:3000/explore?orgId=1&left=%5B"now-1h","now"%5D,{"datasourceUid":"tempo","expression":"$${__value.raw}"}'
          datasourceUid: tempo

  # Tempo datasource
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        tags:
          - key: traceId
            value: traceId
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
