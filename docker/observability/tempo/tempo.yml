server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:

querier:
  max_concurrent_queries: 20

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    compaction_window: 1h
    max_block_bytes: 1073741824
    block_retention: 15m
